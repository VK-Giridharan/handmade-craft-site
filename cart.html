  <!-- Main global script (IMPORTANT - Must come first) -->
  <script src="js/script.js"></script>

  <script>
    /* =====================================================
       CART PAGE LOGIC
       Depends on functions from script.js:
       getCart(), updateCartItem(), removeFromCart(),
       getGrandTotal(), buildOrderMessage(), openWhatsApp()
    ===================================================== */

    function renderCart() {
      const cart = getCart();
      const contentEl = document.getElementById('cartContent');
      const summaryEl = document.getElementById('cartSummary');

      // If cart empty
      if (!cart || cart.length === 0) {
        contentEl.innerHTML = `
          <div class="cart-empty">
            <h2>Your cart is empty</h2>
            <p>Browse our handmade crafts and add items to your cart.</p>
            <a href="shop.html" class="btn btn-primary">Shop Now</a>
          </div>
        `;
        summaryEl.style.display = 'none';
        return;
      }

      // Render items
      contentEl.innerHTML = `
        <div class="cart-items">
          ${cart.map((item, idx) => renderCartItem(item, idx)).join('')}
        </div>
      `;

      // Show summary
      summaryEl.style.display = 'block';
      document.getElementById('grandTotal').textContent = getGrandTotal(cart);

      // Attach listeners
      cart.forEach((item, idx) => {
        attachCartItemListeners(idx);
      });
    }


    function renderCartItem(item, idx) {
  return `
    <div class="cart-item" data-idx="${idx}">
      
      <img src="${item.image}" alt="${item.name}" class="cart-item-image">

      <div class="cart-item-details">
        <span class="cart-item-name">${item.name}</span>
        <span class="cart-item-meta">
          Color: ${item.color} |
          Lighting: ${item.lighting ? 'Yes (+₹100)' : 'No'} |
          Qty: ${item.quantity}
        </span>

        <!-- Edit Panel -->
        <div class="cart-item-edit" id="edit-${idx}">
          <div class="form-row">

            <a>
              <label>Color</label>
  <select class="edit-color" data-idx="${idx}">
    <option value="Red" ${item.color === "Red" ? "selected" : ""}>Red</option>
    <option value="Pink" ${item.color === "Pink" ? "selected" : ""}>Pink</option>
    <option value="Blue" ${item.color === "yellow" ? "selected" : ""}>yellow</option>
    <option value="Custom" ${item.color === "Custom" ? "selected" : ""}>Custom</option>
  </select>

            </a>

            <a>
              <label>Lighting</label>
              <select class="edit-lighting" data-idx="${idx}">
                <option value="false" ${!item.lighting ? 'selected' : ''}>No</option>
                <option value="true" ${item.lighting ? 'selected' : ''}>Yes (+₹100)</option>
              </select>
            </a>

            <a>
              <label>Quantity</label>
              <div class="qty-control" data-idx="${idx}">
                <button type="button" class="qty-btn minus">−</button>
                <input type="number" class="edit-qty" value="${item.quantity}" min="1" data-idx="${idx}" readonly>
                <button type="button" class="qty-btn plus">+</button>
              </div>
            </a>

            <button class="btn btn-primary btn-save-edit" data-idx="${idx}">
              Save
            </button>

          </div>
        </div>

      </div>

      <div class="cart-item-actions">
        <span class="cart-item-price">
          <span class="rupee">₹</span>${item.total}
        </span>

        <div class="cart-item-buttons">
          <button class="btn btn-outline btn-edit" data-idx="${idx}">
            Edit
          </button>
          <button class="btn btn-outline btn-remove" data-idx="${idx}">
            Remove
          </button>
        </div>
      </div>

    </div>
  `;
}


      // ✅ Idha paste pannunga (updated code with +/- buttons)
function attachCartItemListeners(idx) {
  const editBtn = document.querySelector(`.btn-edit[data-idx="${idx}"]`);
  const saveBtn = document.querySelector(`.btn-save-edit[data-idx="${idx}"]`);
  const removeBtn = document.querySelector(`.btn-remove[data-idx="${idx}"]`);
  const editPanel = document.getElementById(`edit-${idx}`);

  // Edit Toggle
  editBtn?.addEventListener('click', () => {
    editPanel.classList.toggle('active');
  });

  // Save Changes
  saveBtn?.addEventListener('click', () => {
    const color = document.querySelector(`.edit-color[data-idx="${idx}"]`).value;
    const lighting = document.querySelector(`.edit-lighting[data-idx="${idx}"]`).value === 'true';
    const quantity = parseInt(document.querySelector(`.edit-qty[data-idx="${idx}"]`).value) || 1;

    updateCartItem(idx, { color, lighting, quantity });
    renderCart();
  });

  // Remove Item
  removeBtn?.addEventListener('click', () => {
    removeFromCart(idx);
    renderCart();
  });

  // 🔥 NEW: Quantity +/- Buttons
  const qtyContainer = document.querySelector(`.qty-control[data-idx="${idx}"]`);
  const qtyInput = document.querySelector(`.edit-qty[data-idx="${idx}"]`);
  
  qtyContainer?.querySelector('.minus')?.addEventListener('click', (e) => {
    e.stopPropagation();
    let val = parseInt(qtyInput.value) || 1;
    if (val > 1) qtyInput.value = val - 1;
  });

  qtyContainer?.querySelector('.plus')?.addEventListener('click', (e) => {
    e.stopPropagation();
    let val = parseInt(qtyInput.value) || 1;
    qtyInput.value = val + 1;
  });

  // Manual input validation
  qtyInput?.addEventListener('change', () => {
    let val = parseInt(qtyInput.value);
    if (!val || val < 1) qtyInput.value = 1;
  });
}


function placeOrderViaWhatsApp() {

  const cart = getCart();

  if (!cart || cart.length === 0) {
    alert("Your cart is empty");
    return;
  }

  let message = "NEW ORDER - ARDHAM ATELIER PETALS\n\n";

  cart.forEach((item, index) => {

    message += `Item ${index + 1}\n`;
    message += `Name: ${item.name}\n`;
    message += `Color: ${item.color}\n`;
    message += `Lighting: ${item.lighting ? "Yes (+₹100)" : "No"}\n`;
    message += `Quantity: ${item.quantity}\n`;
    message += `Price: ₹${item.total}\n`;
    message += `Image: ${item.image}\n\n`;

  });

  message += `Grand Total: ₹${getGrandTotal(cart)}\n\n`;
  message += `Please confirm this order.`;

      const phone = "918431196545";
      
      const whatsappURL =
        `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      
      // WhatsApp open
      window.open(whatsappURL, "_blank");
      
      // 🔥 Cart clear
      localStorage.removeItem("cart");
      
      // Cart page refresh
      renderCart();
      
    }
    
    // Render cart when page loads
    document.addEventListener("DOMContentLoaded", renderCart);
    
  </script>
